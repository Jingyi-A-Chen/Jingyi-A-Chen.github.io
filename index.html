<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Personal homepage for Jingyi Chen.">
    <title>Jingyi Chen</title>
    <link rel="stylesheet" href="assets/css/site.css">
</head>

<body>
    <header class="site-shell topbar">
        <a class="mark" href="#top">Jingyi Chen</a>
        <nav class="nav-links" aria-label="Primary navigation">
            <a href="#about">About</a>
            <a href="#education">Education</a>
            <a href="#publications">Publications</a>
            <a href="#honors">Honors</a>
        </nav>
    </header>

    <main id="top" class="site-shell">
        <section class="hero" aria-labelledby="name">
            <figure class="portrait-card">
                <img id="profile-photo" src="" alt="">
            </figure>

            <div>
                <!-- <p class="kicker">Academic Homepage</p> -->
                <h1><span id="name"></span><span id="native-name" class="native-name"></span></h1>
                <p id="role" class="role"></p>
                <p class="meta"><span id="affiliation"></span> · <span id="location"></span></p>
                <p class="meta">Email: <a id="email" href=""></a></p>
                <div id="profile-links" class="quick-links" aria-label="Profile links"></div>
                <div id="interests" class="chips" aria-label="Research interests"></div>
            </div>
        </section>

        <div class="content-grid">
            <section id="about" class="section-card about-card" aria-labelledby="about-heading">
                <h2 id="about-heading">About</h2>
                <div id="about-text"></div>
                <p>Advisors: <span id="advisors"></span>.</p>
            </section>

            <section id="education" class="section-card education-card" aria-labelledby="education-heading">
                <h2 id="education-heading">Education</h2>
                <ul id="education-list" class="clean-list"></ul>
            </section>

            <section id="publications" class="section-card" aria-labelledby="publications-heading">
                <h2 id="publications-heading">Publications</h2>
                <ol id="publication-list" class="clean-list publication-list"></ol>
            </section>

            <section id="honors" class="section-card" aria-labelledby="honors-heading">
                <h2 id="honors-heading">Honors</h2>
                <ul id="honors-list" class="clean-list"></ul>
            </section>
        </div>
    </main>

    <footer class="footer site-shell">
        <span>&copy; 2024-2026 Jingyi Chen.</span>
    </footer>

    <script type="module" src="assets/js/main.js"></script>
</body>

</html>
